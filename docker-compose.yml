services:
  # PostgreSQL — our main database
  postgres:
    image: postgres:16
    container_name: gethiredasap_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in the root .env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in the root .env file}
    ports:
      - "5432:5432"    # your Mac port : container port
    volumes:
      - postgres_data:/var/lib/postgresql/data  # data persists between restarts

  # Redis — for job queues and caching
  redis:
    image: redis:7-alpine
    container_name: gethiredasap_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
